# Alacritty config — gruvbox-material dark, matches the kitty/rofi/btop
# palette used across this dotfiles tree.
#
# Docs: https://alacritty.org/config-alacritty.html

[general]
# Reload alacritty.toml automatically when it changes on disk so theme
# tweaks land without restarting the terminal.
live_config_reload = true

[window]
padding = { x = 8, y = 8 }
dynamic_padding = true
decorations = "full"
opacity = 0.8
dynamic_title = true

[scrolling]
history = 2000
multiplier = 3

[font]
size = 12.0

[font.normal]
family = "Mononoki Nerd Font"
style  = "Regular"

[font.bold]
family = "Mononoki Nerd Font"
style  = "Bold"

[font.italic]
family = "Mononoki Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "Mononoki Nerd Font"
style  = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true

# --- gruvbox-material dark medium -------------------------------------
[colors.primary]
background = "#282828"
foreground = "#d4be98"

[colors.normal]
black   = "#3c3836"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"

[colors.bright]
black   = "#928374"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"

[colors.cursor]
text   = "#282828"
cursor = "#d4be98"

[colors.selection]
text       = "CellForeground"
background = "#504945"

[keyboard]
# Minimal extras; alacritty's defaults already cover the common ones.
bindings = [
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "F", mods = "Control|Shift", action = "SearchForward" },
    { key = "B", mods = "Control|Shift", action = "SearchBackward" },
    { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]
