#
# picom configuration for openbox sessions.
#
# Primary purpose: composite layered ARGB windows so wine/Chromium apps
# (e.g. wxwork.exe drop-shadow halo) render correctly.
# Shadows/fading are disabled — picom's drop-shadow shows up as a
# thin off-white border on opaque windows, which is unwanted.
#

#### Backend
backend = "glx";
vsync = true;

#### Shadows (disabled — looked like thin pale window borders)
shadow = false;

#### Fading (disabled — keep window appearance instant)
fading = false;

#### Transparency / Opacity
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

#### Corners
corner-radius = 0;

#### Misc
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
