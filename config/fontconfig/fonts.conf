<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Default system-ui fonts -->
  <match target="pattern">
    <test name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>sans-serif</string>
    </edit>
  </match>

  <!--
    Generic family aliases.

    We put the CJK family FIRST so it provides line-metrics for both
    English and Chinese glyphs. Without this, Pango picks Noto Sans for
    Latin runs and falls back to Noto Sans CJK SC for CJK runs; the two
    have different ascent/descent, so a paragraph with mixed scripts ends
    up with uneven line heights (English-only lines visibly shorter than
    lines containing CJK).

    Noto Sans CJK SC ships full Latin glyphs (Source Sans-derived) so
    using it for English is fine and removes the metrics mismatch.
  -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans</family>
      <family>Noto Emoji</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif</family>
      <family>Noto Emoji</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Mononoki Nerd Font</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Emoji</family>
    </prefer>
  </alias>
</fontconfig>
