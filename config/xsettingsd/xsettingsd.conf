# xsettingsd — broadcasts X11 XSETTINGS to GTK/Qt apps so they can
# reload theme/icon settings without restarting. Without this daemon,
# changes to ~/.config/gtk-3.0/settings.ini only take effect for newly
# launched apps, so the system tray (nm-applet, fcitx5, etc.) keeps
# its original icon theme until logout.

Net/IconThemeName "Gruvbox-Plus-Dark"
Net/ThemeName "Adwaita-dark"
Gtk/CursorThemeName "Adwaita"

# Font + DPI hints (kept consistent with ~/.xinitrc Xft.dpi: 192)
Xft/DPI 196608
Xft/Antialias 1
Xft/Hinting 1
Xft/HintStyle "hintslight"
Xft/RGBA "rgb"

Net/EnableEventSounds 0
Net/EnableInputFeedbackSounds 0
